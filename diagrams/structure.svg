<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <style>rect{fill:#f8f9fa;stroke:#2b2f33;stroke-width:2} text{font-family:Segoe UI, Arial, sans-serif;font-size:14px;fill:#111}</style>

  <!-- Root -->
  <rect x="20" y="20" width="280" height="60" rx="6"/>
  <text x="30" y="45">Project Root</text>
  <text x="30" y="65">Machine-Learning/</text>

  <!-- NeuralNetwork folder -->
  <rect x="330" y="20" width="300" height="80" rx="6"/>
  <text x="340" y="45">NeuralNetwork/</text>
  <text x="340" y="65">NeuralNetwork.cpp</text>
  <text x="340" y="83">CMakeLists.txt</text>

  <!-- Headers group -->
  <rect x="20" y="120" width="300" height="140" rx="6"/>
  <text x="30" y="145">Headers/</text>
  <text x="30" y="170">LSTM.h</text>
  <text x="30" y="190">SelfAttention.h</text>
  <text x="30" y="210">TextProcessing.h</text>

  <!-- Vocabulary -->
  <rect x="350" y="120" width="280" height="80" rx="6"/>
  <text x="360" y="145">vocabulary/</text>
  <text x="360" y="170">glove.txt</text>

  <!-- Build folders -->
  <rect x="20" y="300" width="300" height="80" rx="6"/>
  <text x="30" y="325">build/</text>
  <text x="30" y="345">CMake artifacts, .sln, etc.</text>

  <rect x="350" y="300" width="300" height="80" rx="6"/>
  <text x="360" y="325">NeuralNetwork/build/</text>
  <text x="360" y="345">VS projects / executables</text>

  <!-- Diagrams folder -->
  <rect x="700" y="20" width="260" height="60" rx="6"/>
  <text x="710" y="45">diagrams/</text>
  <text x="710" y="65">structure.svg, workflow.svg</text>

  <!-- connectors -->
  <line x1="300" y1="50" x2="330" y2="50" stroke="#2b2f33" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="120" x2="160" y2="120" stroke="transparent"/>
  <line x1="200" y1="80" x2="200" y2="120" stroke="#2b2f33" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="260" y1="340" x2="350" y2="340" stroke="#2b2f33" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b2f33"></path>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="20" y="460" style="font-size:12px;fill:#333">Legend: boxes = folders/files; arrows show containment or build outputs.</text>
</svg>
